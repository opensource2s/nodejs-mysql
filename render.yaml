name: EC2 CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to app directory
            cd /home/ubuntu/nodejs-dev-app 

            # Pull latest code
            git pull origin main

            # Install dependencies (Your buildCommand)
            npm install

            # Set Environment Variables (Your envVars)
            # We create/update a .env file on the server
            echo "NODE_ENV=production" > .env
            echo "PORT=3000" >> .env
            echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
            echo "DB_PORT=5432" >> .env
            echo "DB_NAME=postgres" >> .env
            echo "DB_USER=postgres" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_SSL=true" >> .env

            # Restart the app (Your startCommand)
            # Using pm2 ensures the app stays alive
            pm2 restart nodejs-dev-app || pm2 start npm --name "nodejs-dev-app" -- start